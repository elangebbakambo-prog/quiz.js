<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Quiiz JS</title>

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="container">
    <div id="quiz">
      <h1>
        <span>q</span>uiz <i class="far fa-question-circle"></i>
      </h1>

      <h2 id="question"></h2>
      <h3 id="score"></h3>

      <div class="choices">
        <button id="guess0" class="btn">
          <p id="choices0"></p>
        </button>

        <button id="guess1" class="btn">
          <p id="choices1"></p>
        </button>

        <button id="guess2" class="btn">
          <p id="choices2"></p>
        </button>

        <button id="guess3" class="btn">
          <p id="choices3"></p>
        </button>
      </div>

      <p id="progress"></p>
    </div>
  </div>

  <!-- JS -->
  <script src="./index.js"></script>
</body>
</html>
